name: Unit Tests

on:
  push:
    branches:
      - develop
      - master
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - develop
      - master

jobs:
  unit-tests:
    name: PHPUnit (PHP 8.3 / Magento 2.4.7-p5)
    runs-on: ubuntu-latest

    env:
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        with:
          path: module

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, ctype, curl, dom, gd, hash, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, xsl, zip
          tools: composer:v2
          coverage: none

      - name: Cache Magento vendor
        id: cache-magento
        uses: actions/cache@v4
        with:
          path: ~/magento
          key: magento-2.4.7-p5-php83-v2

      - name: Install Magento 2.4.7-p5
        if: steps.cache-magento.outputs.cache-hit != 'true'
        run: |
          composer create-project \
            --repository-url=https://repo.magento.com/ \
            magento/project-community-edition=2.4.7-p5 ~/magento \
            --no-dev --no-scripts --prefer-dist --no-interaction
          cd ~/magento
          composer config audit.block-insecure false
          composer require --dev phpunit/phpunit:~9.6.0 --no-scripts --no-interaction

      - name: Place module in Magento vendor
        run: |
          mkdir -p ~/magento/vendor/tapbuy
          cp -r module ~/magento/vendor/tapbuy/redirect-tracking

      - name: Create test bootstrap
        run: |
          cat > ~/magento/vendor/tapbuy/bootstrap.php << 'BOOTSTRAP'
          <?php
          declare(strict_types=1);
          require_once __DIR__ . '/../../dev/tests/unit/framework/bootstrap.php';
          $autoloader = include __DIR__ . '/../../vendor/autoload.php';
          $autoloader->addPsr4('Tapbuy\\RedirectTracking\\', __DIR__ . '/redirect-tracking/');
          BOOTSTRAP

      - name: Run PHPUnit
        run: |
          cd ~/magento
          php vendor/bin/phpunit \
            --bootstrap vendor/tapbuy/bootstrap.php \
            vendor/tapbuy/redirect-tracking/Test/Unit/
